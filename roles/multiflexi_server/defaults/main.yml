---
# defaults file for multiflexi_server
multiflexi_server_database_engines:
  - sqlite
  - pgsql
  - mysql
  # - mssql

multiflexi_server_database_type: sqlite  # canonical database type, override in playbook or inventory
multiflexi_server_webserver_type: apache  # default web server type, can be overridden in playbook or inventory

multiflexi_web_interface: true # Install multiflexi-web package

# Optional Zabbix integration variables
multiflexi_server_zabbix_host: null
multiflexi_server_zabbix_server: null

# Optional Node-RED integration. When enabled, installs Node-RED and the
# node-red-contrib-multiflexi nodes, wires the multiflexi-eventor catalog feed
# and shows Node-RED in the MultiFlexi web Integrations menu.
multiflexi_server_nodered_enabled: false
multiflexi_server_nodered_user: nodered
multiflexi_server_nodered_userdir: /var/lib/node-red/.node-red
# Expose the Node-RED editor through the existing HTTPS vhost under this path
# (reverse-proxied to the local node-red) instead of the unencrypted :1880 port.
# Set to "" to disable the proxy and fall back to direct :1880 access.
multiflexi_server_nodered_http_root: /node-red
# Editor URL shown in the Integrations menu (clickable by web users). By default
# the HTTPS reverse-proxied path; falls back to direct :1880 when no proxy root.
multiflexi_server_nodered_url: >-
  {{ ('https://' ~ ansible_fqdn ~ multiflexi_server_nodered_http_root ~ '/')
     if (multiflexi_server_nodered_http_root | length > 0)
     else ('http://' ~ ansible_fqdn ~ ':1880/') }}
# Catalog node HTTP-in path + the URL the event processor pushes the catalog to.
# The catalog receiver stays on the local port (httpNodeRoot is left at '/'),
# so the push path is unaffected by the editor reverse proxy.
multiflexi_server_nodered_catalog_path: /multiflexi-catalog
multiflexi_server_nodered_catalog_url: "http://127.0.0.1:1880/multiflexi-catalog"
# Base URL of the MultiFlexi web image endpoints used by the catalog node
multiflexi_server_nodered_app_url: /multiflexi/
# Seed a flow containing a multiflexi-catalog node (overwrites flows.json)
multiflexi_server_nodered_seed_flow: true

# Database connection defaults (override in inventory; do not commit secrets)
multiflexi_db_host: localhost
multiflexi_db_port: 3306
multiflexi_db_name: multiflexi
multiflexi_db_user: multiflexi
multiflexi_db_password: null

# Extra packages to install (e.g. multiflexi-scheduler, multiflexi-executor, multiflexi-eventor)
multiflexi_extra_packages: []

# Repository configuration
multiflexi_repository_channel: testing
multiflexi_repositories:
  testing:
    repo_url: http://repo.vitexsoftware.com
    gpg_key: http://repo.vitexsoftware.com/KEY.gpg
  stable:
    repo_url: https://repo.multiflexi.eu
    gpg_key: https://repo.multiflexi.eu/KEY.gpg
