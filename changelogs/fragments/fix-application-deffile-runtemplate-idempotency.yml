bugfixes:
  - application - fix ``--deffile`` CLI option that does not exist; map both ``file`` and ``deffile`` module params to ``--file`` (https://github.com/VitexSoftware/multiflexi-ansible-collection/issues).
  - application - fix false ``changed`` on re-runs caused by comparing provided file path against the system-installed ``deffile`` path stored in the API response; file path is now excluded from idempotency checks for existing applications.
  - runtemplate - fix always-changed behaviour on re-runs; module now compares scalar fields and full config dict before deciding to update.
minor_changes:
  - AGENTS.md added with guidance for AI coding agents covering module patterns, known CLI constraints, and local dev install workflow.
